{% extends "base.html" %}

{% block auth_content %}
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #1a2b3c;
    --slate:  #2c3e50;
    --teal:   #3d7a8a;
    --sky:    #6b8898;
    --mist:   #dde6ed;
    --fog:    #f0f5f9;
    --white:  #ffffff;
  }

  .login-root {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'DM Sans', sans-serif;
    background: var(--fog);
    padding: 20px;
    position: relative;
  }

  .login-form-wrap {
    width: 100%;
    max-width: 420px;
    background: var(--white);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(26,43,60,0.08);
    position: relative;
    z-index: 1;
    animation: fadeUp .5s .05s ease both;
  }

  .form-heading { margin-bottom: 24px; text-align: center; }
  .form-heading h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .form-heading p {
    font-size: 14px;
    color: var(--sky);
    line-height: 1.5;
  }

  /* alerts */
  .alert {
    border-radius: 10px;
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 20px;
  }

  /* ── FLOATING LABEL FIELDS ── */
  .field-group { margin-bottom: 18px; }

  .field-inner {
    display: flex;
    align-items: center;
    background: var(--white);
    border: 1.5px solid var(--mist);
    border-radius: 14px;
    transition: border-color .25s, box-shadow .25s;
    overflow: hidden;
    position: relative;
  }
  .field-inner:focus-within {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(61,122,138,.1);
  }

  .field-icon {
    width: 48px;
    display: flex; align-items: center; justify-content: center;
    color: var(--sky);
    font-size: 16px;
    flex-shrink: 0;
    transition: color .2s;
  }
  .field-inner:focus-within .field-icon { color: var(--teal); }

  .field-wrap {
    flex: 1;
    position: relative;
    padding: 18px 12px 6px 0;
  }

  .field-wrap input {
    width: 100%;
    border: none; outline: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--navy);
    line-height: 1;
  }
  .field-wrap input::placeholder { color: transparent; }

  .field-wrap label {
    position: absolute;
    top: 50%; left: 0;
    transform: translateY(-50%);
    font-size: 13.5px;
    color: #9fb4c0;
    pointer-events: none;
    transition: all .2s cubic-bezier(.4,0,.2,1);
  }

  .field-wrap input:focus + label,
  .field-wrap input:not(:placeholder-shown) + label {
    top: 7px;
    transform: none;
    font-size: 10px;
    letter-spacing: .5px;
    color: var(--teal);
  }

  .toggle-pw {
    width: 44px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer;
    color: var(--sky);
    font-size: 15px;
    transition: color .15s;
    flex-shrink: 0;
  }
  .toggle-pw:hover { color: var(--teal); }

  /* ── SUBMIT ── */
  .btn-submit {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    background: var(--navy);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .5px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 24px;
    position: relative;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 6px 20px rgba(26,43,60,.2);
  }
  .btn-submit::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--teal), var(--navy));
    opacity: 0;
    transition: opacity .3s;
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(26,43,60,.28); }
  .btn-submit:hover::before { opacity: 1; }
  .btn-submit span, .btn-submit i { position: relative; z-index: 1; }
  .btn-submit:active { transform: translateY(0); }

  .btn-submit.loading { pointer-events: none; opacity: .75; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .65s linear infinite;
    display: none;
  }
  .btn-submit.loading .spinner { display: block; }
  .btn-submit.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>

<div class="login-root">
  <div class="login-form-wrap">

    <div style="text-align: center; margin-bottom: 20px;">
        <div style="width: 54px; height: 54px; background: linear-gradient(135deg, var(--teal), #2a5a68); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 10px 28px rgba(61,122,138,.4);">
            <i class="bi bi-key-fill" style="font-size: 24px; color: var(--white);"></i>
        </div>
    </div>

    <div class="form-heading">
      <h2>Set New Password</h2>
      <p>Please enter your new password below.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="" onsubmit="return validatePassword(this)">
      <!-- Password -->
      <div class="field-group">
        <div class="field-inner">
          <div class="field-icon"><i class="bi bi-lock"></i></div>
          <div class="field-wrap">
            <input id="sk-pw" type="password" name="password"
                   placeholder="password" required minlength="6">
            <label for="sk-pw">New Password</label>
          </div>
          <button class="toggle-pw" type="button" onclick="togglePw(this, 'sk-pw')" tabindex="-1">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>
      </div>
      
      <!-- Confirm Password -->
      <div class="field-group">
        <div class="field-inner">
          <div class="field-icon"><i class="bi bi-check-circle"></i></div>
          <div class="field-wrap">
            <input id="sk-pw-confirm" type="password" name="confirm_password"
                   placeholder="confirm password" required minlength="6">
            <label for="sk-pw-confirm">Confirm Password</label>
          </div>
          <button class="toggle-pw" type="button" onclick="togglePw(this, 'sk-pw-confirm')" tabindex="-1">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button class="btn-submit" type="submit" id="submit-btn">
        <div class="spinner"></div>
        <span class="btn-text"><i class="bi bi-check2-all"></i>&nbsp; Update Password</span>
      </button>
    </form>
  </div>
</div>

<script>
function togglePw(btn, inputId) {
  const input = document.getElementById(inputId);
  const icon  = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye-slash';
  }
}

function validatePassword(form) {
    const pw = document.getElementById('sk-pw').value;
    const confirm_pw = document.getElementById('sk-pw-confirm').value;
    
    if (pw !== confirm_pw) {
        alert("Passwords do not match!");
        return false;
    }
    
    document.getElementById('submit-btn').classList.add('loading');
    return true;
}
</script>
{% endblock %}
