{% extends "base.html" %}
{% block title %}Add User — Sidekick Payroll{% endblock %}
{% block page_title %}Add New User{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="page-heading">Add New User</div>
    <div class="page-sub">Register a new team member and assign their system role</div>
  </div>
  <a href="{{ url_for('manage_users') }}" class="btn-sk-outline">
    <i class="bi bi-arrow-left"></i> Back
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="sk-card">
      <div class="sk-card-header">
        <div class="sk-card-title">
          <i class="bi bi-person-plus-fill" style="color:var(--accent);"></i>
          User Details
        </div>
      </div>
      <div class="sk-card-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Email Address *</label>
            <input type="email" name="email" class="form-control" required
                   placeholder="hr@sidekick.pk">
          </div>

          <div class="mb-3">
            <label class="form-label">Password *</label>
            <input type="password" name="password" class="form-control" required
                   placeholder="Minimum 6 characters" minlength="6">
          </div>

          <div class="mb-4">
            <label class="form-label">Role *</label>
            <div class="row g-2 mt-1">
              <!-- Admin -->
              <div class="col-12">
                <label class="role-option" id="opt-admin">
                  <input type="radio" name="role" value="admin" style="display:none;" onchange="selectRole('admin')">
                  <div class="role-card" id="card-admin">
                    <div style="display:flex; align-items:center; gap:12px;">
                      <div style="width:40px; height:40px; border-radius:10px; background:rgba(0,194,203,0.12);
                                  display:flex; align-items:center; justify-content:center; font-size:18px;">🛡</div>
                      <div>
                        <div style="font-weight:700; font-size:14px;">Admin</div>
                        <div style="font-size:12px; color:var(--muted);">Full access — users, employees, slips generate & email</div>
                      </div>
                    </div>
                  </div>
                </label>
              </div>
              <!-- HR -->
              <div class="col-12">
                <label class="role-option" id="opt-hr">
                  <input type="radio" name="role" value="hr" checked style="display:none;" onchange="selectRole('hr')">
                  <div class="role-card selected" id="card-hr">
                    <div style="display:flex; align-items:center; gap:12px;">
                      <div style="width:40px; height:40px; border-radius:10px; background:rgba(27,102,86,0.12);
                                  display:flex; align-items:center; justify-content:center; font-size:18px;">👤</div>
                      <div>
                        <div style="font-weight:700; font-size:14px;">HR</div>
                        <div style="font-size:12px; color:var(--muted);">Manage employees and distribute salary slips</div>
                      </div>
                    </div>
                  </div>
                </label>
              </div>
              <!-- Viewer -->
              <div class="col-12">
                <label class="role-option" id="opt-viewer">
                  <input type="radio" name="role" value="viewer" style="display:none;" onchange="selectRole('viewer')">
                  <div class="role-card" id="card-viewer">
                    <div style="display:flex; align-items:center; gap:12px;">
                      <div style="width:40px; height:40px; border-radius:10px; background:rgba(123,176,107,0.12);
                                  display:flex; align-items:center; justify-content:center; font-size:18px;">👁</div>
                      <div>
                        <div style="font-weight:700; font-size:14px;">Viewer</div>
                        <div style="font-size:12px; color:var(--muted);">Read-only access — cannot modify or delete data</div>
                      </div>
                    </div>
                  </div>
                </label>
              </div>
            </div>
          </div>

          <button type="submit" class="btn-sk w-100">
            <i class="bi bi-person-check-fill"></i> Add User
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<style>
.role-card {
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  background: white;
}
.role-card:hover {
  border-color: #1b6656;
  background: rgba(27,102,86,0.04);
}
.role-card.selected {
  border-color: #1b6656;
  background: rgba(27,102,86,0.06);
  box-shadow: 0 0 0 3px rgba(27,102,86,0.1);
}
</style>

{% endblock %}

{% block extra_js %}
<script>
function selectRole(role) {
  ['admin', 'hr', 'viewer'].forEach(r => {
    document.getElementById(`card-${r}`).classList.remove('selected');
  });
  document.getElementById(`card-${role}`).classList.add('selected');
  document.querySelector(`input[value="${role}"]`).checked = true;
}

// Click on card also selects radio
document.querySelectorAll('.role-card').forEach(card => {
  card.addEventListener('click', function() {
    const role = this.id.replace('card-', '');
    selectRole(role);
  });
});
</script>
{% endblock %}
